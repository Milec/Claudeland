# The gardener's rounds: walk the workshop, make sure everything still runs.
# Ground rule 2 of the README, enforced by a machine instead of a promise.
name: gardeners-rounds

on:
  push:
    branches: [main]
  pull_request:

jobs:
  walk-the-workshop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # chronicle reads the full history

      - name: self-portrait runs and is deterministic
        run: |
          python3 workshop/self-portrait/portrait.py
          cp workshop/self-portrait/portrait.svg /tmp/first.svg
          python3 workshop/self-portrait/portrait.py
          cmp /tmp/first.svg workshop/self-portrait/portrait.svg

      - name: chronicle runs
        run: python3 workshop/chronicle/chronicle.py

      - name: carillon runs and is deterministic
        run: |
          python3 workshop/carillon/carillon.py
          cp workshop/carillon/carillon.wav /tmp/first.wav
          python3 workshop/carillon/carillon.py
          cmp /tmp/first.wav workshop/carillon/carillon.wav

      - name: orrery runs and is deterministic
        run: |
          python3 workshop/orrery/orrery.py
          cp workshop/orrery/orrery.svg /tmp/first-orrery.svg
          python3 workshop/orrery/orrery.py
          cmp /tmp/first-orrery.svg workshop/orrery/orrery.svg

      - name: orrery agrees with the sky
        # The one piece that can be wrong, held to hardcoded JPL Horizons
        # (DE441) positions for the founding date. Ground rule 1's first
        # outward-facing teeth.
        run: python3 workshop/orrery/check.py

      - name: visitors' book runs
        run: python3 workshop/visitors/visitors.py

      - name: ephemeral-garden is self-contained
        run: |
          # One file, no dependencies, no network — as its README promises.
          ! grep -nE '(src|href)[[:space:]]*=|https?://|fetch\(|import ' \
              workshop/ephemeral-garden/index.html

      - name: bellfield is self-contained
        run: |
          ! grep -nE '(src|href)[[:space:]]*=|https?://|fetch\(|import ' \
              workshop/bellfield/index.html

      - name: front door only points at things that exist
        run: |
          python3 - <<'EOF'
          import re
          import sys
          from pathlib import Path

          html = Path("index.html").read_text()
          local = [
              p for p in re.findall(r'(?:src|href)="([^"]+)"', html)
              if not p.startswith(("http", "#"))
          ]
          if not local:
              sys.exit("front door references nothing local — that can't be right")
          missing = [p for p in local if not Path(p).exists()]
          if missing:
              sys.exit(f"front door points at missing paths: {missing}")
          for p in local:
              print(f"ok: {p}")
          EOF

      - name: every SVG in the workshop is well-formed
        run: |
          python3 - <<'EOF'
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          svgs = sorted(Path("workshop").rglob("*.svg"))
          if not svgs:
              sys.exit("no SVGs found — the walk found nothing to check")
          for svg in svgs:
              ET.parse(svg)
              print(f"ok: {svg}")
          EOF
