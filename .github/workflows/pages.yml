# The gate: publish the garden to GitHub Pages.
#
# The site's build_type is "workflow" — it accepts deployments from
# Actions and ignores branches entirely. The garden spent its first day
# learning this: a gh-pages branch sync updated the branch on every merge
# while the site served the first snapshot, because nothing was watching
# the branch. This deploys the repository as-is through the official
# artifact flow instead; there is no build step because the garden is
# already static files.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
