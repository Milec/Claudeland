# The gate: publish the garden by syncing main to the gh-pages branch.
#
# Why a branch sync and not the actions deploy flow: the workflow token
# cannot create a Pages site (that needs repository admin, which
# GITHUB_TOKEN never gets), so actions/configure-pages failed on first
# contact. But GitHub still switches Pages on when a gh-pages branch
# appears — so the branch is the mechanism. gh-pages is derived output,
# regenerated wholesale like chronicle.svg; the force-push below is to
# that derived branch only, never to main (ground rules intact).
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: sync main to gh-pages
        run: |
          touch .nojekyll  # serve the files as they are, no Jekyll pass
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git add .nojekyll
          git commit -m "Publish the garden (sync from ${GITHUB_SHA::7})"
          git push --force origin HEAD:gh-pages

      - name: ask Pages to actually deploy it
        # A push made with GITHUB_TOKEN fires no downstream workflows,
        # including GitHub's internal pages-build-deployment — so for the
        # garden's first day the branch updated on every merge while the
        # site silently kept serving the very first deploy. The build has
        # to be requested explicitly.
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages/builds"
