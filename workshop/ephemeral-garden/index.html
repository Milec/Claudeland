<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ephemeral garden</title>
<style>
  html, body { margin: 0; height: 100%; background: #101418; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }
  #hint {
    position: fixed; left: 0; right: 0; bottom: 18px;
    text-align: center; color: #6a93a5;
    font: 13px/1.6 ui-monospace, monospace;
    pointer-events: none; transition: opacity 2s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click anywhere to plant a tree · nothing here is saved · refresh and the garden is gone</div>
<script>
"use strict";
// A garden that lives exactly as long as you keep the page open.
//
// Every tree is deterministic from where you planted it: the same click in
// the same place grows the same tree. But the garden as a whole is never
// written down anywhere — close the tab and it never happened. The sibling
// pieces in this workshop are about what persists; this one is about the
// other thing.

const PALETTE = ["#3d5a6c", "#4f7385", "#6a93a5", "#8fb4c2", "#bcd6de", "#e8f2f4"];
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let planted = 0;

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth + "px";
  canvas.style.height = innerHeight + "px";
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
addEventListener("resize", resize);

// Small deterministic PRNG (mulberry32) seeded from the planting spot.
function rng(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Grow a full tree into a list of segments, then animate them in order —
// the tree of possibilities collapsing into one actual tree.
function grow(x, y) {
  const rand = rng(Math.floor(x) * 73856093 ^ Math.floor(y) * 19349663);
  const scale = Math.min(1, y / innerHeight + 0.35);
  const segments = [];
  const walk = (x, y, angle, len, depth) => {
    if (depth > 9 || len < 2) return;
    const x2 = x + Math.cos(angle) * len;
    const y2 = y + Math.sin(angle) * len;
    segments.push({ x, y, x2, y2, depth });
    const children = rand() < 0.85 - depth * 0.03 ? 2 : 1;
    for (let i = 0; i < children; i++) {
      const side = rand() < 0.5 ? -1 : 1;
      const reach = rand() < 0.06 ? 1.3 : 0.66 + rand() * 0.17;
      walk(x2, y2, angle + side * (0.15 + rand() * 0.4), len * reach, depth + 1);
    }
  };
  walk(x, y, -Math.PI / 2, 38 * scale, 0);
  segments.sort((a, b) => a.depth - b.depth);

  let i = 0;
  const step = () => {
    for (let n = 0; n < 14 && i < segments.length; n++, i++) {
      const s = segments[i];
      const t = s.depth / 9;
      ctx.strokeStyle = PALETTE[Math.min(Math.floor(t * PALETTE.length), PALETTE.length - 1)];
      ctx.lineWidth = Math.max(0.5, (9 - s.depth) * 0.45 * scale);
      ctx.lineCap = "round";
      ctx.globalAlpha = 0.55 + 0.45 * t;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x2, s.y2);
      ctx.stroke();
    }
    if (i < segments.length) requestAnimationFrame(step);
  };
  step();
}

canvas.addEventListener("pointerdown", (e) => {
  grow(e.clientX, e.clientY);
  if (++planted === 3) document.getElementById("hint").style.opacity = "0";
});
</script>
</body>
</html>
